file_format: definition/2

attribute_groups:
  - id: emb.tap
    visibility: public
    stability: development
    brief: "Embrace tap breadcrumb attributes"
    attributes:
      - ref: tap.type
      - ref: tap.coords

  - id: emb.breadcrumb
    visibility: public
    stability: development
    brief: "Embrace breadcrumb attributes"
    attributes:
      - ref: message

  - id: emb.view
    visibility: public
    stability: development
    brief: "Embrace view/screen attributes"
    attributes:
      - ref: view.name

  - id: emb.push_notification
    visibility: public
    stability: development
    brief: "Embrace push notification attributes"
    attributes:
      - ref: notification.title
      - ref: notification.type
      - ref: notification.body
      - ref: notification.id
      - ref: notification.from
      - ref: notification.priority

  - id: emb.aei
    visibility: public
    stability: development
    brief: "Embrace Application Exit Info attributes"
    attributes:
      - ref: aei_session_id
      - ref: aei_user_session_id
      - ref: aei_session_part_id
      - ref: session_id_error
      - ref: process_importance
      - ref: pss
      - ref: reason
      - ref: rss
      - ref: exit_status
      - ref: timestamp
      - ref: description
      - ref: trace_status

  - id: emb.network_captured_request
    visibility: public
    stability: development
    brief: "Embrace network captured request attributes"
    attributes:
      - ref: duration
      - ref: end-time
      - ref: network-id
      - ref: request-body
      - ref: request-query
      - ref: request-size
      - ref: response-body
      - ref: response-size
      - ref: start-time
      - ref: url
      - ref: encrypted-payload

  - id: emb.network_status
    visibility: public
    stability: development
    brief: "Embrace network status attributes"
    attributes:
      - ref: network

  - id: emb.thermal_state
    visibility: public
    stability: development
    brief: "Embrace thermal state attributes"
    attributes:
      - ref: status

  - id: emb.smoothness
    visibility: public
    stability: development
    brief: "Embrace smoothness vital attributes (experimental)"
    attributes:
      - ref: smoothness.outcome
      - ref: smoothness.frame_count
      - ref: smoothness.normalized_dropped_frames
      - ref: smoothness.idle_threshold_ms
      - ref: smoothness.held_idle_threshold_ms
      - ref: smoothness.jank_heuristic_multiplier

  - id: emb.screen_load
    visibility: public
    stability: development
    brief: "Embrace screen-load vital attributes (experimental)"
    attributes:
      - ref: screen_load.outcome
      - ref: screen_load.nav_start_delay_ms
      - ref: screen_load.nav_duration_ms
      - ref: screen_load.first_frame_duration_ms
      - ref: screen_load.idle_threshold_ms
      - ref: screen_load.timeout_ms
      - ref: screen_load.nav_timeout_ms

  - id: emb.network_request
    visibility: public
    stability: development
    brief: "Embrace-specific network request attributes"
    attributes:
      - ref: emb.w3c_traceparent
      - ref: emb.forward_telemetry
      - ref: emb.trace_id

  - id: emb.anr
    visibility: public
    stability: development
    brief: "Embrace ANR / thread blockage attributes"
    attributes:
      - ref: interval_code
      - ref: last_known_time_unix_nano
      - ref: sample_overhead
      - ref: sample_code
      - ref: thread_priority
      - ref: frame_count

  - id: emb.network_state
    visibility: public
    stability: development
    brief: "Embrace network connectivity state attributes"
    attributes:
      - ref: network.status

  - id: emb.power_state
    visibility: public
    stability: development
    brief: "Embrace device power state attributes"
    attributes:
      - ref: power.mode

  - id: emb.session
    visibility: public
    stability: development
    brief: "Embrace session part span attributes"
    attributes:
      - ref: emb.state
      - ref: emb.cold_start
      - ref: emb.session_number
      - ref: emb.clean_exit
      - ref: emb.terminated
      - ref: emb.heartbeat_time_unix_nano
      - ref: emb.crash_id
      - ref: emb.session_start_type
      - ref: emb.session_end_type
      - ref: emb.startup_duration
      - ref: emb.error_log_count
      - ref: emb.disk_free_bytes
      - ref: emb.private.send_mode
      - ref: emb.startup_activity
      - ref: emb.process_identifier
      - ref: emb.private.sequence_id
      - ref: emb.user_session_id
      - ref: emb.user_session_number
      - ref: emb.user_session_start_ts
      - ref: emb.session_part_id
      - ref: emb.session_part_number
      - ref: emb.user_session_part_index
      - ref: emb.is_final_session_part
      - ref: emb.is_background_only_part
      - ref: emb.user_session_termination_reason
      - ref: emb.user_session_max_duration_seconds
      - ref: emb.user_session_inactivity_timeout_seconds
      - ref: emb.clock_network_drift
      - ref: emb.clock_gnss_drift

  - id: emb.android
    visibility: public
    stability: development
    brief: "Embrace Android platform attributes"
    attributes:
      - ref: emb.android.threads
      - ref: emb.android.crash_number
      - ref: emb.android.aei_crash_number
      - ref: emb.exception_handling
      - ref: emb.android.crash.exception_cause
      - ref: emb.android.react_native_crash.js_exception
      - ref: emb.android.native_crash.exception
      - ref: emb.android.native_crash.symbols

  - id: emb.state_transition
    visibility: public
    stability: development
    brief: "Embrace state transition tracking attributes"
    attributes:
      - ref: emb.state.initial_value
      - ref: emb.state.new_value
      - ref: emb.state.transition_count
      - ref: emb.state.not_in_session
      - ref: emb.state.dropped_by_instrumentation

  - id: emb.attachment
    visibility: public
    stability: development
    brief: "Embrace log message attachment attributes"
    attributes:
      - ref: emb.attachment_size
      - ref: emb.attachment_url
      - ref: emb.attachment_id
      - ref: emb.attachment_error_code

  - id: emb.span
    visibility: public
    stability: development
    brief: "Embrace span-level attributes"
    attributes:
      - ref: emb.error_code
      - ref: emb.link_type
      - ref: emb.private
      - ref: emb.termination_cause

  - id: emb.telemetry
    visibility: public
    stability: development
    brief: "Embrace SDK self-telemetry and environment attributes"
    attributes:
      - ref: emb.okhttp3
      - ref: emb.okhttp3_on_classpath
      - ref: emb.kotlin_on_classpath
      - ref: emb.is_emulator
      - ref: emb.storage.used
      - ref: emb.storage.available

attributes:
  - key: tap.type
    type: string
    brief: "The type of tap event (tap or long_press)."
    stability: development
    examples: ["tap", "long_press"]
  - key: tap.coords
    type: string
    brief: "The coordinates of the tap event in x,y format."
    stability: development
    examples: ["100,200", "0,0"]
  - key: message
    type: string
    brief: "The breadcrumb message."
    stability: development
    examples: ["User tapped login"]
  - key: view.name
    type: string
    brief: "The name of the view or screen."
    stability: development
    examples: ["MainActivity", "LoginFragment"]
  - key: notification.title
    type: string
    brief: "The title of the push notification."
    stability: development
    examples: ["New message"]
  - key: notification.type
    type: string
    brief: "The type of push notification."
    stability: development
    examples: ["notif", "data", "notif-data", "unknown"]
  - key: notification.body
    type: string
    brief: "The body text of the push notification."
    stability: development
    examples: ["You have a new message"]
  - key: notification.id
    type: string
    brief: "The ID of the push notification."
    stability: development
    examples: ["abc123"]
  - key: notification.from
    type: string
    brief: "The sender of the push notification."
    stability: development
    examples: ["123456789"]
  - key: notification.priority
    type: string
    brief: "The priority of the push notification."
    stability: development
    examples: ["0", "1", "2"]
  - key: aei_session_id
    type: string
    brief: "The session ID associated with the AEI event."
    stability: development
    examples: ["abc123"]
  - key: aei_user_session_id
    type: string
    brief: "The user session ID where the AEI occurred."
    stability: development
    examples: ["abc123"]
  - key: aei_session_part_id
    type: string
    brief: "The session part ID where the AEI occurred."
    stability: development
    examples: ["abc123"]
  - key: session_id_error
    type: string
    brief: "Error message if the session ID could not be determined."
    stability: development
    examples: ["session not found"]
  - key: process_importance
    type: string
    brief: "The importance level of the process at exit."
    stability: development
    examples: ["100", "125"]
  - key: pss
    type: string
    brief: "Proportional set size of the process at exit (bytes)."
    stability: development
    examples: ["12345678"]
  - key: reason
    type: string
    brief: "The reason for the application exit."
    stability: development
    examples: ["1", "2", "6"]
  - key: rss
    type: string
    brief: "Resident set size of the process at exit (bytes)."
    stability: development
    examples: ["23456789"]
  - key: exit_status
    type: string
    brief: "The exit status code of the process."
    stability: development
    examples: ["0", "1"]
  - key: timestamp
    type: string
    brief: "The timestamp of the application exit event."
    stability: development
    examples: ["1617983000000"]
  - key: description
    type: string
    brief: "A description of the application exit."
    stability: development
    examples: ["ANR detected"]
  - key: trace_status
    type: string
    brief: "The trace status at the time of exit."
    stability: development
    examples: ["OK", "ERROR"]
  - key: duration
    type: string
    brief: "The duration of the network request in milliseconds."
    stability: development
    examples: ["1234"]
  - key: end-time
    type: string
    brief: "The end time of the network request in milliseconds since epoch."
    stability: development
    examples: ["1617983000000"]
  - key: network-id
    type: string
    brief: "The ID of the network interface used for the request."
    stability: development
    examples: ["wifi0"]
  - key: request-body
    type: string
    brief: "The body of the network request."
    stability: development
    examples: ["{\"key\": \"value\"}"]
  - key: request-query
    type: string
    brief: "The query parameters of the network request."
    stability: development
    examples: ["foo=bar&baz=qux"]
  - key: request-size
    type: string
    brief: "The size of the network request body in bytes."
    stability: development
    examples: ["1024"]
  - key: response-body
    type: string
    brief: "The body of the network response."
    stability: development
    examples: ["{\"result\": \"ok\"}"]
  - key: response-size
    type: string
    brief: "The size of the network response body in bytes."
    stability: development
    examples: ["2048"]
  - key: start-time
    type: string
    brief: "The start time of the network request in milliseconds since epoch."
    stability: development
    examples: ["1617982999000"]
  - key: url
    type: string
    brief: "The URL of the network request."
    stability: development
    examples: ["https://example.com/api/v1/resource"]
  - key: encrypted-payload
    type: string
    brief: "The encrypted payload of the network request or response."
    stability: development
    examples: ["abc123encrypted"]
  - key: network
    type: string
    brief: "The network connectivity status."
    stability: development
    examples: ["wifi", "cellular", "none"]
  - key: status
    type: string
    brief: "The thermal state status of the device."
    stability: development
    examples: ["0", "1", "2", "3"]
  - key: smoothness.outcome
    type: string
    brief: "How the focal moment ended."
    stability: development
    examples: ["settled", "interrupted"]
  - key: smoothness.frame_count
    type: int
    brief: "Number of frames rendered during the focal moment."
    stability: development
    examples: [10, 42]
  - key: smoothness.normalized_dropped_frames
    type: double
    brief: "Total jank over the focal moment, expressed in 60fps-reference frames."
    stability: development
    examples: [0.5, 2.0]
  - key: smoothness.idle_threshold_ms
    type: int
    brief: "The idle threshold that was applied to determine when the focal moment had settled."
    stability: development
    examples: [100, 150]
  - key: smoothness.held_idle_threshold_ms
    type: int
    brief: "The 'press and hold' settle threshold that was applied."
    stability: development
    examples: [500, 600]
  - key: smoothness.jank_heuristic_multiplier
    type: double
    brief: "The grace multiplier that was applied to a frame's budget/deadline before it was considered janky."
    stability: development
    examples: [2.0, 2.5]
  - key: screen_load.outcome
    type: string
    brief: "How the screen load ended."
    stability: development
    examples: ["settled", "timed_out", "user_interrupted", "navigation_interrupted"]
  - key: screen_load.nav_start_delay_ms
    type: int
    brief: "Duration from the initial interaction until the navigation start event, in milliseconds."
    stability: development
    examples: [10, 50]
  - key: screen_load.nav_duration_ms
    type: int
    brief: "Duration from the navigation start event until the navigation end event, in milliseconds."
    stability: development
    examples: [10, 100]
  - key: screen_load.first_frame_duration_ms
    type: int
    brief: "Duration from the navigation end event until the first frame rendered on the destination, in milliseconds."
    stability: development
    examples: [10, 100]
  - key: screen_load.idle_threshold_ms
    type: int
    brief: "The idle threshold that was applied to determine when the destination screen had settled."
    stability: development
    examples: [1000, 1500]
  - key: screen_load.timeout_ms
    type: int
    brief: "The maximum duration that was applied before the screen load was force-reported as timed out."
    stability: development
    examples: [30000, 45000]
  - key: screen_load.nav_timeout_ms
    type: int
    brief: "The maximum tap-to-navigation-start gap that was applied to link the two events into one screen load."
    stability: development
    examples: [500, 750]
  - key: emb.w3c_traceparent
    type: string
    brief: "The W3C traceparent header value forwarded with the network request."
    stability: development
    examples: ["00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01"]
  - key: emb.forward_telemetry
    type: boolean
    brief: "Indicates the span should be forwarded to the customer's backend."
    stability: development
    examples: [true]
  - key: emb.trace_id
    type: string
    brief: "The Embrace trace ID used for correlation."
    stability: development
    examples: ["a3ce929d0e0e4736"]
  - key: interval_code
    type: string
    brief: "The ANR interval code."
    stability: development
    examples: ["1", "2"]
  - key: last_known_time_unix_nano
    type: string
    brief: "The last known time the thread was responsive (nanoseconds since epoch)."
    stability: development
    examples: ["1617983000000000000"]
  - key: sample_overhead
    type: string
    brief: "The overhead of collecting this sample (nanoseconds)."
    stability: development
    examples: ["500000"]
  - key: sample_code
    type: string
    brief: "The ANR sample code."
    stability: development
    examples: ["1", "2"]
  - key: thread_priority
    type: string
    brief: "The priority of the blocked thread."
    stability: development
    examples: ["5", "10"]
  - key: frame_count
    type: string
    brief: "The number of stack frames in the thread sample."
    stability: development
    examples: ["10", "50"]
  - key: network.status
    type:
      allow_custom_values: false
      members:
        - id: not_reachable
          value: "none"
          brief: "No network reachability"
          stability: development
        - id: unverified
          value: "unverified"
          brief: "Network present but not verified"
          stability: development
        - id: wifi
          value: "wifi"
          brief: "WiFi connection"
          stability: development
        - id: wifi_connecting
          value: "wifi_connecting"
          brief: "WiFi connection being established"
          stability: development
        - id: wan
          value: "wan"
          brief: "Mobile/WAN connection"
          stability: development
        - id: wan_connecting
          value: "wan_connecting"
          brief: "Mobile/WAN connection being established"
          stability: development
        - id: unknown
          value: "unknown"
          brief: "Unknown network state"
          stability: development
        - id: unknown_connecting
          value: "unknown_connecting"
          brief: "Unknown network connection being established"
          stability: development
    brief: "The network connectivity status."
    stability: development
    examples: ["wifi", "wan", "none"]
  - key: power.mode
    type:
      allow_custom_values: false
      members:
        - id: normal
          value: "normal"
          brief: "Normal power mode"
          stability: development
        - id: low
          value: "low"
          brief: "Low power / battery saver mode"
          stability: development
        - id: unknown
          value: "unknown"
          brief: "Unknown power mode"
          stability: development
    brief: "The device power mode."
    stability: development
    examples: ["normal", "low"]
  - key: emb.state
    type: string
    brief: "The application state (foreground/background) at the time the log was recorded."
    stability: development
    examples: ["foreground", "background"]
  - key: emb.cold_start
    type: string
    brief: "Whether the session is a cold start."
    stability: development
    examples: ["true", "false"]
  - key: emb.session_number
    type: string
    brief: "Session number (integer sequence ID)."
    stability: development
    examples: ["1", "42"]
  - key: emb.clean_exit
    type: string
    brief: "Whether the session was ended by the SDK or an unexpected termination."
    stability: development
    examples: ["true", "false"]
  - key: emb.terminated
    type: string
    brief: "Whether the session was terminated."
    stability: development
    examples: ["true", "false"]
  - key: emb.heartbeat_time_unix_nano
    type: string
    brief: "Last known time that the session existed (nanoseconds since epoch)."
    stability: development
    examples: ["1617983000000000000"]
  - key: emb.crash_id
    type: string
    brief: "The crash report ID tied to the session."
    stability: development
    examples: ["abc123"]
  - key: emb.session_start_type
    type: string
    brief: "The session start type."
    stability: development
    examples: ["cold_start", "resume"]
  - key: emb.session_end_type
    type: string
    brief: "The session end type."
    stability: development
    examples: ["clean_exit", "crash"]
  - key: emb.startup_duration
    type: string
    brief: "The startup duration in nanoseconds."
    stability: development
    examples: ["1000000000"]
  - key: emb.error_log_count
    type: string
    brief: "The number of error logs in a session."
    stability: development
    examples: ["0", "5"]
  - key: emb.disk_free_bytes
    type: string
    brief: "The number of free bytes on disk."
    stability: development
    examples: ["1073741824"]
  - key: emb.private.send_mode
    type: string
    brief: "How a signal should be delivered to the Embrace backend."
    stability: development
    examples: ["immediate", "DEFER"]
  - key: emb.startup_activity
    type: string
    brief: "The name of the Activity that app startup completed in."
    stability: development
    examples: ["MainActivity"]
  - key: emb.process_identifier
    type: string
    brief: "Monotonically increasing sequence ID given to completed spans expected to be sent to the server."
    stability: development
    examples: ["abc123"]
  - key: emb.private.sequence_id
    type: string
    brief: "Unique ID assigned to each app instance."
    stability: development
    examples: ["1", "42"]
  - key: emb.user_session_id
    type: string
    brief: "UUID identifying the session."
    stability: development
    examples: ["3a1c2b4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d"]
  - key: emb.user_session_number
    type: string
    brief: "Incremental counter of sessions since SDK install."
    stability: development
    examples: ["1", "42"]
  - key: emb.user_session_start_ts
    type: string
    brief: "Session start timestamp (milliseconds since epoch)."
    stability: development
    examples: ["1617983000000"]
  - key: emb.session_part_id
    type: string
    brief: "UUID identifying the session part."
    stability: development
    examples: ["3a1c2b4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d"]
  - key: emb.session_part_number
    type: string
    brief: "Monotonically incrementing counter of session parts since SDK install. Seeded from emb.session_number when first created; increments by 1 on each new session part. Never resets across process or session boundaries."
    stability: development
    examples: ["1", "2", "42"]
  - key: emb.user_session_part_index
    type: string
    brief: "The index of the part within the session. 1-indexed, matching the behavior of session_number."
    stability: development
    examples: ["1", "2"]
  - key: emb.is_final_session_part
    type: string
    brief: "Set to 1 when the SDK knows for certain this is the final part of a session (max duration reached, inactivity timeout, or manual termination). Omitted when the value would be 0."
    stability: development
    examples: ["1"]
  - key: emb.is_background_only_part
    type: string
    brief: "Set to 1 when the session part belongs to a background user session, i.e. a user session covering a period when the app process is alive but the user is not active. Omitted for regular user sessions."
    stability: development
    examples: ["1"]
  - key: emb.user_session_termination_reason
    type:
      allow_custom_values: false
      members:
        - id: max_duration_reached
          value: "max_duration_reached"
          brief: "Session ended because the maximum session duration was reached."
          stability: development
        - id: inactivity
          value: "inactivity"
          brief: "Session ended due to inactivity timeout."
          stability: development
        - id: manual
          value: "manual"
          brief: "Session ended by manual termination."
          stability: development
        - id: background_only_user_session_foregrounded
          value: "background_only_user_session_foregrounded"
          brief: "Background-only user session ended because the app entered the foreground."
          stability: development
        - id: clock_mismatch
          value: "clock_mismatch"
          brief: "The current timestamp is before the active session, so the user session cannot continue."
          stability: development
    brief: "The reason the session part was terminated."
    stability: development
    examples: ["max_duration_reached", "inactivity", "manual", "background_only_user_session_foregrounded"]
  - key: emb.user_session_max_duration_seconds
    type: string
    brief: "The maximum session duration (in seconds) that the SDK was configured to use."
    stability: development
    examples: ["3600", "7200"]
  - key: emb.user_session_inactivity_timeout_seconds
    type: string
    brief: "The inactivity timeout (in seconds) that the SDK was configured to use."
    stability: development
    examples: ["300", "1800"]
  - key: emb.clock_network_drift
    type: string
    brief: "Drift in milliseconds. Positive = network clock behind wall clock. (Wall Time - Network Time)"
    stability: development
    examples: ["123", "-321"]
  - key: emb.clock_gnss_drift
    type: string
    brief: "Drift in milliseconds. Positive = GNSS clock behind wall clock. (Wall Time - GNSS Time)"
    stability: development
    examples: ["987", "-789"]
  - key: emb.android.threads
    type: string
    brief: "A snapshot of the current call stack of the threads running in the app process."
    stability: development
    examples: ["[{...}]"]
  - key: emb.android.crash_number
    type: string
    brief: "Sequence number for the number of crashes captured by Embrace on the device."
    stability: development
    examples: ["1", "42"]
  - key: emb.android.aei_crash_number
    type: string
    brief: "Sequence number for the number of AEI crashes captured by Embrace on the device."
    stability: development
    examples: ["1", "42"]
  - key: emb.exception_handling
    type: string
    brief: "The exception handling type - whether it's handled or unhandled."
    stability: development
    examples: ["handled", "unhandled"]
  - key: emb.android.crash.exception_cause
    type: string
    brief: "The list of Throwable that caused the exception responsible for a crash."
    stability: development
    examples: ["cause1 -> cause2"]
  - key: emb.android.react_native_crash.js_exception
    type: string
    brief: "The JavaScript unhandled exception from the ReactNative layer."
    stability: development
    examples: ["TypeError: undefined is not a function"]
  - key: emb.android.native_crash.exception
    type: string
    brief: "Exception coming from the native layer."
    stability: development
    examples: ["SIGSEGV"]
  - key: emb.android.native_crash.symbols
