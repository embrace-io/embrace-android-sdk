syntax = "proto2";

package embrace.session;

option java_package = "io.embrace.android.embracesdk.internal.delivery.storage.session.proto";

// Schemas mirroring the subset of io.embrace.android.embracesdk.internal.payload types needed to
// persist a session part as a directory of independently-written Wire files.
// proto2 + optional is used so nullability round-trips cleanly back to the kotlinx data classes.

enum SpanStatusProto {
  UNSET = 0;
  ERROR = 1;
  OK = 2;
}

message AttributeProto {
  optional string key = 1;
  optional string value = 2;
}

message SpanEventProto {
  optional string name = 1;
  optional int64 time_unix_nano = 2;
  repeated AttributeProto attributes = 3;
}

message LinkProto {
  optional string span_id = 1;
  optional string trace_id = 2;
  repeated AttributeProto attributes = 3;
  optional bool is_remote = 4;
}

message SpanProto {
  optional string trace_id = 1;
  optional string span_id = 2;
  optional string parent_span_id = 3;
  optional string name = 4;
  optional int64 start_time_unix_nano = 5;
  optional int64 end_time_unix_nano = 6;
  optional SpanStatusProto status = 7;
  repeated SpanEventProto events = 8;
  repeated AttributeProto attributes = 9;
  repeated LinkProto links = 10;
}

message EnvelopeResourceProto {
  optional string app_version = 1;
  optional int32 app_framework = 2; // AppFramework.value (1=Native,2=ReactNative,3=Unity,4=Flutter)
  optional string build_id = 3;
  optional string app_ecosystem_id = 4;
  optional string build_type = 5;
  optional string build_flavor = 6;
  optional string environment = 7;
  optional string bundle_version = 8;
  optional string sdk_version = 9;
  optional int32 sdk_simple_version = 10;
  optional string react_native_bundle_id = 11;
  optional string react_native_version = 12;
  optional string javascript_patch_number = 13;
  optional string hosted_platform_version = 14;
  optional string hosted_sdk_version = 15;
  optional string unity_build_id = 16;
  optional string device_manufacturer = 17;
  optional string device_model = 18;
  optional string device_architecture = 19;
  optional bool jailbroken = 20;
  optional int64 disk_total_capacity = 21;
  optional string os_type = 22;
  optional string os_name = 23;
  optional string os_version = 24;
  optional string os_code = 25;
  optional string screen_resolution = 26;
  optional int32 num_cores = 27;
  map<string, string> extras = 28;
}

message EnvelopeMetadataProto {
  optional string user_id = 1;
  optional string email = 2;
  optional string username = 3;
  repeated string personas = 4;
  optional string timezone_description = 5;
  optional string locale = 6;
}

// ---- File wrappers ----

// manifest.wire (written once, at part start)
message ManifestProto {
  optional EnvelopeResourceProto resource = 1;
  optional string version = 2;
  optional string type = 3;
  map<string, string> shared_lib_symbol_mapping = 4;
}

// metadata.wire (rewritten on identity/timezone/locale change)
message MetadataFileProto {
  optional EnvelopeMetadataProto metadata = 1;
}

// one length-framed record appended to completed_spans.wire per completed span
message CompletedSpanRecordProto {
  optional SpanProto span = 1;
}

// span_snapshots.wire (overwritten when in-flight spans change)
message SpanSnapshotsProto {
  repeated SpanProto spans = 1;
}

// session_span.wire (overwritten every ~2s - carries heartbeat/error-count poison-pill attrs)
message SessionSpanProto {
  optional SpanProto span = 1;
}
