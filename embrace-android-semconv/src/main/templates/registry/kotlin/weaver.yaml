comment_formats:
  kdoc:
    format: markdown
    header: "/**"
    prefix: " * "
    footer: " */"
default_comment_format: kdoc
templates:
  - pattern: embrace_semconv_template.kt.j2
    filter: >
      .registry.attribute_groups
      | map(select(.id | startswith("emb.")))
      | map({
          group_id: .id,
          brief: (.brief // ""),
          stability: (.stability // "stable"),
          attributes: ((.attributes // []) | map({
            name: .key,
            brief: (.brief // ""),
            type: .type
          }))
        })
    application_mode: each
    file_name: "{{ ctx.group_id | replace('.', '_') | pascal_case }}Attributes.kt"
