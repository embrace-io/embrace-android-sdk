comment_formats:
  xmldoc:
    format: plain
    header: ""
    prefix: "/// "
    footer: ""
default_comment_format: xmldoc
templates:
  - pattern: semconv_template.cs.j2
    filter: >
      .groups
      | map(select(.type == "attribute_group"))
      | map({
          group_id: .id,
          brief: (.brief // ""),
          attributes: (.attributes // [])
        })
    application_mode: each
    file_name: "{{ ctx.group_id | replace('.', '_') | pascal_case }}Attributes.cs"
